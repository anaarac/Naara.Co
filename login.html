<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Naara Co</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-visual">
            <img src="./imagens/Aura - lilas frente .WEBP" alt="Naara Lifestyle">
            <div class="visual-overlay">
                <h2 class="italic-font">Sua melhor versão começa aqui.</h2>
            </div>
        </div>

        <div class="login-content">
            <a href="index.html" class="back-home">
                <ion-icon name="arrow-back-outline"></ion-icon> Voltar
            </a>
            
            <div class="login-header">
                <img src="./imagens/Logo2.png" alt="Logo" class="login-logo">
                <h3>Bem-vinda de volta</h3>
                <p>Acesse sua conta para conferir seus pedidos.</p>
            </div>

            <form class="login-form">
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" placeholder="seu@email.com" required>
                </div>
                
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" placeholder="••••••••" required>
                    <a href="#" class="forgot-pass">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
                
                <div class="divider"><span>ou</span></div>
                
                <button type="button" class="btn-google">
                    <ion-icon name="logo-google"></ion-icon> Continuar com Google
                </button>
            </form>

            <p class="signup-link">Não tem uma conta? <a href="#">Criar agora</a></p>
        </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
