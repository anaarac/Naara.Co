<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Naara Co</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="paginas.css">
    <link rel="stylesheet" href="login.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Inter:wght@300;400;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="login-page-body">

    <header id="header">
        <div class="logo-wrapper">
            <img src="./imagens/Logo2.png" alt="Logo Naara Co" class="nav-logo">
            <span class="brand-name">NAARA <span class="gold-text">CO</span></span>
        </div>
        <nav class="menu">
            <a href="index.html">Novidades</a>
            <a href="./legging.html">Legging</a>
            <a href="./tops.html">Blusas & Tops</a>
            <a href="./macacoes.html">Macacões</a>
            <a href="./short.html">Shorts & Bermudas</a>
            <a href="./conjuntos.html">Conjuntos</a>
        </nav>
        <div class="icons">
            <a href="index.html" title="Voltar"><ion-icon name="arrow-back-outline"></ion-icon></a>
            <a href="carrinho.html"><ion-icon name="cart-outline"></ion-icon></a>
        </div>
    </header>

    <main class="login-split-container">
        <div class="login-side-visual">
            <video autoplay muted loop playsinline class="login-video">
                <source src="./videos/Aura.MP4" type="video/mp4">
            </video>
            <div class="visual-overlay"></div>
        </div>

        <div class="login-side-form">
            <div class="login-glass-card">
                <div class="login-header">
                    <h3>Bem-vinda</h3>
                    <p>Acesse sua conta exclusiva Naara Co.</p>
                </div>

                <form class="login-form-fields">
                    <div class="input-box">
                        <label>E-mail</label>
                        <input type="email" placeholder="exemplo@email.com" required>
                    </div>
                    <div class="input-box">
                        <label>Senha</label>
                        <input type="password" placeholder="••••••••" required>
                        <a href="#" class="forgot-link">Esqueceu a senha?</a>
                    </div>

                    <button type="submit" class="btn-login-main">Entrar</button>

                    <div class="login-divider"><span>ou entre com:</span></div>

                    <div class="social-login-column">
                        <button type="button" class="btn-social">
                            <ion-icon name="logo-google"></ion-icon>
                            <span>Entrar com Google</span>
                        </button>
                        <button type="button" class="btn-social">
                            <ion-icon name="logo-apple"></ion-icon>
                            <span>Entrar com Apple</span>
                        </button>
                    </div>
                </form>

                <div class="login-footer">
                    <p>Não tem conta? <a href="#" class="gold-text">Criar cadastro</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer class="cart-mini-footer">
        <div class="footer-content">
            <p>© 2026 Naara Co. — Todos os direitos reservados</p>
            <div class="footer-links">
                <a href="#">Privacidade</a>
                <a href="#">Termos de Uso</a>
                <a href="#">Trocas e Devoluções</a>
            </div>
        </div>
    </footer>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

</html>
