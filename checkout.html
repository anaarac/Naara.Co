<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <title>Checkout - Naara Co</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

</head>

<body>

    <div class="shipping-banner">
        🚚 Frete grátis para todo Brasil em compras acima de R$199
    </div>

    <header id="header">

        <div class="logo">NAARA CO</div>

        <nav>

            <a href="index.html">Home</a>
            <a href="#">Conjuntos</a>
            <a href="#">Leggings</a>
            <a href="#">Tops</a>

        </nav>

    </header>


    <section class="checkout">

        <h1>Finalizar compra</h1>

        <div class="checkout-grid">

            <div class="checkout-form">

                <h2>Dados pessoais</h2>

                <input type="text" placeholder="Nome completo" required>

                <input type="email" placeholder="Email" required>

                <input type="tel" placeholder="Telefone">


                <h2>Endereço</h2>

                <input type="text" placeholder="CEP">

                <input type="text" placeholder="Rua">

                <input type="text" placeholder="Número">

                <input type="text" placeholder="Complemento">

                <input type="text" placeholder="Cidade">

                <input type="text" placeholder="Estado">


                <h2>Pagamento</h2>

                <select>

                    <option>Cartão de crédito</option>
                    <option>PIX</option>
                    <option>Boleto</option>

                </select>

                <button class="finish">
                    Finalizar pedido
                </button>

            </div>


            <div class="order-summary">

                <h2>Resumo do pedido</h2>

                <div class="order-product">

                    <img src="imagens/produto1.jpg">

                    <div>

                        <p>Conjunto Aura</p>

                        <p>R$189,90</p>

                    </div>

                </div>

                <hr>

                <div class="total">

                    <p>Total</p>

                    <strong>R$189,90</strong>

                </div>

            </div>

        </div>

    </section>


    <footer>

        <div class="socials">

            <a href="#">
                <img src="icones/instagram.svg">
            </a>

            <a href="#">
                <img src="icones/tiktok.svg">
            </a>

        </div>

        <p>
            © 2025 Naara Co — Todos os direitos reservados
        </p>

    </footer>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
</body>

</html>
